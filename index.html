<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catalog Produse</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
}

h1{
    text-align: center;
    margin-bottom: 20px;
}

#search{
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 16px;
}

.brand{
    margin-top:50px;
    margin-bottom:20px;
    font-size:36px;
    font-weight:900;
    text-align:center;
    padding:15px;
    background:#ffffff;
    color:#111;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

body.dark .brand{
    background:#2a2a2a;
    color:#ffffff;
    box-shadow:0 2px 8px rgba(255,255,255,.05);
}

.category{
    margin-top: 25px;
    margin-bottom: 15px;
    font-size: 24px;
    font-weight: bold;
    color: #ffffff;
    background: #444;
    padding: 12px 15px;
    border-radius: 10px;
}

.product{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: white;
    border-radius: 10px;
    margin-bottom: 10px;
    text-decoration: none;
    color: black;
    box-shadow: 0 2px 5px rgba(0,0,0,.1);
    transition: .15s;
}

.product:hover{
    transform: translateY(-1px);
}

.price{
    color: green;
    font-weight: bold;
}

.no-results{
    text-align: center;
    color: #777;
    margin-top: 30px;
}

#themeToggle{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:15px;
    font-size:14px;
}

body.dark{
    background:#121212;
    color:white;
}

body.dark .product{
    background:#1e1e1e;
    color:white;
}

body.dark .price{
    color:#5cff8d;
}

body.dark #search{
    background:#222;
    color:white;
    border:1px solid #444;
}

body.dark .brand{
    color:white;
    border-bottom:3px solid #666;
}

body.dark .category{
    background:#333;
    color:white;
}

.category{
    cursor:pointer;
    user-select:none;
}

.category-products{
    display:none;
    margin-bottom:15px;
}    

.site-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#1e1e1e;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

.logo img{
    height:80px;
    display:block;
}

.contact{
    display:flex;
    align-items:center;
    gap:15px;
    margin-left:auto;
}

.footer-contact{
    display:flex;
    align-items:center;
    gap:12px;
}
    
.contact a{
    text-decoration:none;
}

.whatsapp-header{
    margin-left:15px;
    background:#25D366;
    color:white;
    text-decoration:none;
    padding:8px 14px;
    border-radius:20px;
    font-weight:bold;
    display:inline-block;
}

.whatsapp-header:hover{
    opacity:0.9;
}
    
.site-footer{
    margin-top:50px;
    padding:20px;
    background:white;
    border-radius:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

body.dark .site-header,
body.dark .site-footer{
    background:#1e1e1e;
    color:white;
}
    
.site-footer a{
    color: inherit;
}

        
</style>
    
</head>
    
<body>

<header class="site-header">

    <div class="logo">
        <img src="logo.png" alt="BBB Mobile">
    </div>

    <div class="contact">

        <span>☎️ 0767 390 261</span>

        <a
            href="https://wa.me/40767390261?text=Salut,%20sunt%20interesat%20de%20un%20produs%20de%20pe%20BBB%20Mobile."
            class="whatsapp-header"
            target="_blank"
        >
            💬 WhatsApp
        </a>

    </div>

</header>
        
</header>
    
<h1>📱 Catalog Produse</h1>
<button id="themeToggle">🌙 Dark Mode</button>

<input
    type="text"
    id="search"
    placeholder="Caută produs..."
>

<div id="products"></div>

<script>

const sheetId = "1BBdI0f7LoA1hYXyLfVS4sqJpUAIb1ejCkxfLlmLT3YI";

const url = `https://opensheet.elk.sh/${sheetId}/Produse`;

let produse = [];

fetch(url)
    .then(response => response.json())
    .then(data => {

        console.log("Date primite:", data);

        produse = data;

        afiseazaProduse();
    })
    .catch(error => {

        console.error(error);

        document.getElementById("products").innerHTML =
            "<div class='no-results'>Eroare la încărcarea produselor.</div>";
    });

function afiseazaProduse(filtru = "") {

    const container = document.getElementById("products");

    container.innerHTML = "";

    let currentCategoryId = "";
    let categoryCounter = 0;

    produse.forEach(p => {

        const tip = (p.Tip || "").trim().toLowerCase();
        const nume = (p.Producator || "").trim();
        const pret = (p.Pret || "").trim();
        const link = (p.Link || "#").trim();

        if (tip === "brand") {

            container.innerHTML += `
                <h2 class="brand">${nume}</h2>
            `;
        }

        else if (tip === "categorie") {

            categoryCounter++;

            currentCategoryId =
                "cat_" + categoryCounter;

            container.innerHTML += `
                <div class="category"
                     onclick="toggleCategory('${currentCategoryId}', this)">
                    ${filtru ? '▼' : '▶'} ${nume}
                </div>

                <div id="${currentCategoryId}"
                     class="category-products"
                     style="${filtru ? 'display:block' : 'display:none'}">
                </div>
            `;
        }

        else if (tip === "produs") {

            if (filtru) {

    const query = filtru
        .toLowerCase()
        .trim()
        .split(/\s+/);

    const text = nume.toLowerCase();

    if (!query.every(word => text.includes(word)))
        return;
}

            const categoryDiv =
                document.getElementById(currentCategoryId);

            if (categoryDiv) {

                if (link && link !== "#") {

    categoryDiv.innerHTML += `
        <a class="product"
           href="${link}"
           target="_blank">

            <span>${nume} 🔗</span>

            <span class="price">
                ${pret} Lei
            </span>

        </a>
    `;

} else {

    categoryDiv.innerHTML += `
        <div class="product">

            <span>${nume}</span>

            <span class="price">
                ${pret} Lei
            </span>

        </div>
    `;
}
            }
        }

    });
}


document
    .getElementById("search")
    .addEventListener("input", function(e){

        afiseazaProduse(e.target.value);

    });

 const themeToggle =
    document.getElementById("themeToggle");

if(localStorage.getItem("theme") === "dark"){

    document.body.classList.add("dark");

    themeToggle.innerText =
        "☀️ Light Mode";
}

themeToggle.addEventListener("click", () => {

    document.body.classList.toggle("dark");

    if(document.body.classList.contains("dark")){

        localStorage.setItem("theme","dark");

        themeToggle.innerText =
            "☀️ Light Mode";

    } else {

        localStorage.setItem("theme","light");

        themeToggle.innerText =
            "🌙 Dark Mode";
    }

});

function toggleCategory(id, element){

    const content =
        document.getElementById(id);

    if(content.style.display === "block"){

        content.style.display = "none";

        element.innerHTML =
            element.innerHTML.replace("▼","▶");

    }else{

        content.style.display = "block";

        element.innerHTML =
            element.innerHTML.replace("▶","▼");
    }
}
    
</script>

<footer class="site-footer">

    <div>
       © BBB Mobile
    </div>

    <div class="footer-contact">

        <span>☎️ 0767 390 261</span>

        <a
            href="https://wa.me/40767390261?text=Salut,%20sunt%20interesat%20de%20un%20produs%20de%20pe%20BBB%20Mobile."
            class="whatsapp-header"
            target="_blank"
        >
            💬 WhatsApp
        </a>

        |

        <a href="privacy.html">
            Politică de confidențialitate
        </a>

    </div>

</footer>
    
</body>
</html>
