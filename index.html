<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catalog Produse</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:900px;
    margin:auto;
    padding:20px;
    background:#f4f4f4;
}

h1{
    text-align:center;
}

#search{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-bottom:20px;
}

.product{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:white;
    border-radius:10px;
    margin-bottom:10px;
    text-decoration:none;
    color:black;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.product:hover{
    transform:translateY(-1px);
}

.price{
    color:green;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>Catalog Produse</h1>

<input type="text" id="search" placeholder="Caută produs...">

<div id="products"></div>

<script>

const sheetId = "1Um6EaoSLswkMltar9K5MitBjdK6E00ahfPQtzT0BLyg";

const url =
`https://opensheet.elk.sh/${sheetId}/Produse`;

let produse = [];

fetch(url)
.then(r => r.json())
.then(data => {

    console.log(data);

    produse = data;

    function afiseazaProduse(filtru = "") {

    const container = document.getElementById("products");

    container.innerHTML = "";

    produse.forEach(p => {

        const tip = p.Tip || "";
        const nume = p.Producator || "";
        const pret = p.Pret || "";
        const link = p.Link || "#";

        if (tip === "produs" &&
            !nume.toLowerCase().includes(filtru.toLowerCase()))
            return;

        if (tip === "brand") {

            container.innerHTML += `
                <h2 style="
                    margin-top:30px;
                    margin-bottom:15px;
                    color:#222;
                    border-bottom:2px solid #ddd;
                    padding-bottom:5px;">
                    ${nume}
                </h2>
            `;
        }

        else if (tip === "categorie") {

            container.innerHTML += `
                <h3 style="
                    margin-top:20px;
                    margin-bottom:10px;
                    color:#666;">
                    ${nume}
                </h3>
            `;
        }

        else if (tip === "produs") {

            container.innerHTML += `
                <a class="product"
                   href="${link}"
                   target="_blank">

                    <span>${nume}</span>

                    <span class="price">
                        ${pret} Lei
                    </span>

                </a>
            `;
        }

    });
}
document
.getElementById("search")
.addEventListener("input", e => {
    afiseazaProduse(e.target.value);
});

</script>

</body>
</html>
